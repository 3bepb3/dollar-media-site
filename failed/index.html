<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed — Silverpathian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050505;
      --accent-primary: #00f0ff;
      --accent-glow: rgba(0, 240, 255, 0.4);
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.1);
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(239,68,68,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 48px;
      max-width: 520px;
      width: 90%;
      background: #0f1115;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(239,68,68,0.07), 0 30px 60px rgba(0,0,0,0.5);
    }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .icon-wrap svg { width: 40px; height: 40px; }
    h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #fff;
    }
    p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 32px 0;
    }
    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .info-box p { margin-bottom: 0; font-size: 0.95rem; }
    .info-box strong { color: var(--accent-primary); }
    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      background: var(--accent-primary);
      color: #000;
      text-decoration: none;
      box-shadow: 0 0 20px var(--accent-glow);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { background: #fff; transform: translateY(-2px); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" stroke="#ef4444" stroke-width="1.5"/>
        <path d="M14 14L26 26M26 14L14 26" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Payment Failed</h1>
    <p>The payment was cancelled or could not be completed. No funds have been charged.</p>
    <hr class="divider">
    <div class="info-box">
      <p>If you believe this is an error or need help, please contact us at <strong>support@silverpathian.com</strong> and we'll assist you right away.</p>
    </div>
    <div class="btn-group">
      <a href="/checkout" class="btn-primary">Try Again</a>
      <a href="/" class="btn-secondary">Return Home</a>
    </div>
  </div>
</body>
</html>
