<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Silverpathian</title>
  <meta name="description" content="Your Silverpathian order has been confirmed.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050505;
      --accent-primary: #00f0ff;
      --accent-glow: rgba(0, 240, 255, 0.4);
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.1);
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 48px;
      max-width: 520px;
      width: 90%;
      background: #0f1115;
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(16,185,129,0.08), 0 30px 60px rgba(0,0,0,0.5);
    }
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .icon-wrap svg { width: 40px; height: 40px; }
    h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #fff;
    }
    p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 32px 0;
    }
    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .info-box p { margin-bottom: 0; font-size: 0.95rem; }
    .info-box strong { color: var(--accent-primary); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      background: var(--accent-primary);
      color: #000;
      text-decoration: none;
      box-shadow: 0 0 20px var(--accent-glow);
      transition: all 0.3s ease;
    }
    .btn:hover { background: #fff; transform: translateY(-2px); }
    @keyframes checkPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .icon-wrap { animation: checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" stroke="#10b981" stroke-width="1.5"/>
        <path d="M12 20.5L17.5 26L28 15" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Payment Confirmed!</h1>
    <p>Thank you for your order. Your Silverpathian Vault Pro is on its way.</p>
    <hr class="divider">
    <div class="info-box">
      <p>A confirmation email will be sent to your inbox shortly. If you have any questions about your order, contact us at <strong>support@silverpathian.com</strong></p>
    </div>
    <a href="/" class="btn">Return to Home</a>
  </div>
</body>
</html>
